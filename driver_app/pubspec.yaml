name: fleet_os_driver
description: Fleet OS Driver Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # HTTP & API
  http: ^1.1.0
  dio: ^5.4.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # Location
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  permission_handler: ^11.1.0
  
  # Maps (Google Maps - requires API key)
  google_maps_flutter: ^2.5.0
  
  # Camera / Image capture
  image_picker: ^1.0.4
  path_provider: ^2.1.1
  
  # UI Components
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  
  # Signature Pad
  signature: ^5.4.1
  
  # Utils
  intl: ^0.18.1
  url_launcher: ^6.2.1
  connectivity_plus: ^5.0.2
  
  # Loading & Animations
  flutter_spinkit: ^5.2.0
  lottie: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
